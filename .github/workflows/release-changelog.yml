name: Update Changelog on Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Get tag version and date
        id: tag_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DATE=$(git log -1 --format=%aI "$GITHUB_REF" | cut -dT -f1)
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.tag_info.outputs.version }}"
          DATE="${{ steps.tag_info.outputs.date }}"
          REPO="${{ github.repository }}"

          # Replace "Unreleased" with the release date on the matching version heading
          sed -i "s/^## \[${VERSION}\] - Unreleased$/## [${VERSION}] - ${DATE}/" CHANGELOG.md

          # Update the comparison link from ...HEAD to ...version tag
          sed -i "s|\[${VERSION}\]: https://github.com/${REPO}/compare/\(.*\)\.\.\.HEAD|[${VERSION}]: https://github.com/${REPO}/compare/\1...${VERSION}|" CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update CHANGELOG.md for release ${{ steps.tag_info.outputs.version }}"
          git push
