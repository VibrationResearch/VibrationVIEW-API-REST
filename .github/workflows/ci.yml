name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  type-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run mypy
        run: mypy routes/ utils/ --ignore-missing-imports

  check-pinned-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for outdated pinned versions
        run: |
          outdated=""
          while IFS= read -r line; do
            # Skip comments and blank lines
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            # Only check pinned (==) packages
            if [[ "$line" =~ ^([a-zA-Z0-9_-]+)==([0-9.]+) ]]; then
              pkg="${BASH_REMATCH[1]}"
              # Skip Windows-only packages that cannot be queried on Linux
              [[ "$pkg" == "pywin32" ]] && continue
              pinned="${BASH_REMATCH[2]}"
              latest=$(pip index versions "$pkg" 2>/dev/null | head -1 | grep -oP '\((\K[^)]+)')
              if [ -n "$latest" ] && [ "$pinned" != "$latest" ]; then
                echo "::warning file=requirements.txt::$pkg is pinned at $pinned but $latest is available"
                outdated="$outdated\n  $pkg: $pinned -> $latest"
              fi
            fi
          done < requirements.txt
          if [ -n "$outdated" ]; then
            echo ""
            echo -e "Outdated pinned versions found:$outdated"
          else
            echo "All pinned versions are up to date."
          fi

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not hardware and not slow"
