name: Build Release Executable

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller app.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: VibrationVIEW-API-${{ github.ref_name }}
          path: dist/VibrationVIEW-API/

      - name: Copy docs into dist folder
        run: |
          Copy-Item README.md dist/VibrationVIEW-API/
          Copy-Item SETUP-README.md dist/VibrationVIEW-API/
          Copy-Item .env.example dist/VibrationVIEW-API/

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist/VibrationVIEW-API/* -DestinationPath dist/VibrationVIEW-API-${{ github.ref_name }}.zip

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VibrationVIEW-API-${{ github.ref_name }}.zip
